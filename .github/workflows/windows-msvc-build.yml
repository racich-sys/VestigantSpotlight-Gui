name: Windows MSVC Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build with MSVC Batch Script
        shell: pwsh
        run: |
          # Pipe output to log and ensure errors bubble up
          .\build_windows_msvc.bat 2>&1 | Tee-Object -FilePath windows_build.log
          if ($LASTEXITCODE -ne 0) {
            throw "Build script exited with code $LASTEXITCODE"
          }

          # Verify all targets built successfully
          $targets = @("VestigantSpotlight.exe", "VestigantSpotlightCli.exe", "VestigantSpotlightTests.exe")
          foreach ($t in $targets) {
            if (!(Test-Path ".\build-msvc\Release\$t")) {
              throw "Required executable '$t' was not produced."
            }
          }

      - name: Test CLI Version Output
        shell: pwsh
        run: |
          .\build-msvc\Release\VestigantSpotlightCli.exe --version

      - name: Run Self-Test Suite
        shell: pwsh
        run: |
          .\build-msvc\Release\VestigantSpotlightTests.exe ".\build-msvc\selftest_out"
          if ($LASTEXITCODE -ne 0) {
            throw "Self-tests failed with exit code $LASTEXITCODE"
          }

      - name: Upload Build Log
        if: always() # Upload log even if the build or tests fail
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-log
          path: windows_build.log
          retention-days: 14

      - name: Upload Compiled Binaries
        uses: actions/upload-artifact@v4
        with:
          name: vestigantspotlight-windows-binaries
          path: build-msvc/Release/*.exe
          retention-days: 14